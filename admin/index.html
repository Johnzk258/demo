<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>314Pi Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    .login { max-width: 400px; margin: 100px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .login h1 { text-align: center; margin-bottom: 24px; color: #611f69; }
    .login input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .login button { width: 100%; padding: 12px; background: #611f69; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login button:hover { background: #4a174f; }
    .dashboard { display: none; }
    .header { background: #611f69; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; }
    .header button { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 24px; }
    .stat-card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .stat-card .number { font-size: 36px; font-weight: bold; color: #611f69; }
    .stat-card .label { color: #888; margin-top: 8px; }
    .tabs { display: flex; gap: 0; padding: 0 24px; background: white; border-bottom: 2px solid #f0f2f5; }
    .tab { padding: 12px 24px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; }
    .tab.active { border-bottom-color: #611f69; color: #611f69; }
    .content { padding: 24px; }
    table { width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-collapse: collapse; }
    th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; }
    td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    tr:hover { background: #f8f9fa; }
    .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-green { background: #e8f5e9; color: #2e7d32; }
    .badge-red { background: #ffebee; color: #c62828; }
    .badge-yellow { background: #fff3e0; color: #e65100; }
    .btn-delete { background: #ffebee; color: #c62828; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-delete:hover { background: #ffcdd2; }
    .empty { text-align: center; padding: 48px; color: #888; }
  </style>
</head>
<body>
  <div class="login" id="loginPage">
    <h1>🔐 314Pi Admin</h1>
    <input type="password" id="adminKey" placeholder="Enter Admin Key" onkeypress="if(event.key==='Enter')login()">
    <button onclick="login()">Login</button>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>314Pi Admin Dashboard</h1>
      <button onclick="logout()">Logout</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('users')">Users</div>
      <div class="tab" onclick="switchTab('orders')">Orders</div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <script>
    const API = 'https://three14pi-backend.onrender.com/admin';
    let adminKey = localStorage.getItem('adminKey') || '';
    let currentTab = 'users';

    if (adminKey) showDashboard();

    function login() {
      adminKey = document.getElementById('adminKey').value;
      localStorage.setItem('adminKey', adminKey);
      showDashboard();
    }

    function logout() {
      adminKey = '';
      localStorage.removeItem('adminKey');
      document.getElementById('loginPage').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }

    async function api(path) {
      const res = await fetch(API + path, { headers: { 'admin-key': adminKey } });
      if (res.status === 403) { logout(); alert('Invalid Admin Key'); return null; }
      return res.json();
    }

    async function showDashboard() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      await loadStats();
      await loadTab();
    }

    async function loadStats() {
      const stats = await api('/stats');
      if (!stats) return;
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="number">${stats.totalUsers}</div><div class="label">Total Users</div></div>
        <div class="stat-card"><div class="number">${stats.totalOrders}</div><div class="label">Total Orders</div></div>
        <div class="stat-card"><div class="number">${stats.paidOrders}</div><div class="label">Paid Orders</div></div>
        <div class="stat-card"><div class="number">${stats.cancelledOrders}</div><div class="label">Cancelled</div></div>
      `;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadTab();
    }

    async function loadTab() {
      if (currentTab === 'users') await loadUsers();
      else await loadOrders();
    }

    async function loadUsers() {
      const users = await api('/users');
      if (!users || !users.length) { document.getElementById('content').innerHTML = '<div class="empty">No users yet</div>'; return; }
      document.getElementById('content').innerHTML = `
        <table><tr><th>Username</th><th>UID</th><th>Roles</th><th>Created</th><th>Action</th></tr>
        ${users.map(u => `<tr>
          <td>${u.username}</td><td>${u.uid}</td>
          <td>${(u.roles||[]).join(', ')}</td>
          <td>${u._id ? new Date(parseInt(u._id.toString().slice(0,8),16)*1000).toLocaleDateString() : '-'}</td>
          <td><button class="btn-delete" onclick="deleteUser('${u._id}')">Delete</button></td>
        </tr>`).join('')}</table>`;
    }

    async function loadOrders() {
      const orders = await api('/orders');
      if (!orders || !orders.length) { document.getElementById('content').innerHTML = '<div class="empty">No orders yet</div>'; return; }
      document.getElementById('content').innerHTML = `
        <table><tr><th>Payment ID</th><th>Product</th><th>User</th><th>Status</th><th>Created</th></tr>
        ${orders.map(o => `<tr>
          <td>${o.pi_payment_id ? o.pi_payment_id.slice(0,12) + '...' : '-'}</td>
          <td>${o.product_id || '-'}</td>
          <td>${o.user ? o.user.slice(0,8) + '...' : '-'}</td>
          <td>${o.paid ? '<span class="badge badge-green">Paid</span>' : o.cancelled ? '<span class="badge badge-red">Cancelled</span>' : '<span class="badge badge-yellow">Pending</span>'}</td>
          <td>${o.created_at ? new Date(o.created_at).toLocaleDateString() : '-'}</td>
        </tr>`).join('')}</table>`;
    }

    async function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      await fetch(API + '/users/' + id, { method: 'DELETE', headers: { 'admin-key': adminKey } });
      loadUsers();
      loadStats();
    }
  </script>
</body>
</html>
